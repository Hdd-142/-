<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>瑶瑶的放松小狗</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Hiragino Sans GB', 'Microsoft YaHei', sans-serif;
      background-color: #FFF8DC;
      color: #5D4E37;
      overflow: hidden;
      touch-action: pan-y;
      user-select: none;
      -webkit-user-select: none;
    }

    .stars {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
      z-index: 1;
      overflow: hidden;
    }

    .star {
      position: absolute;
      border-radius: 50%;
      background: rgba(255, 255, 255, 0.6);
      box-shadow: 0 0 10px rgba(255, 255, 255, 0.8);
      animation: floatStar 4s ease-in-out infinite, breathe 3s ease-in-out infinite alternate;
    }

    @keyframes floatStar {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-10px); }
    }

    @keyframes breathe {
      0% { opacity: 0.4; }
      100% { opacity: 0.9; }
    }

    .app {
      position: relative;
      width: 100%;
      height: 100vh;
      overflow: hidden;
    }

    .pages {
      display: flex;
      width: 100%;
      height: 100%;
      transition: transform 0.3s ease;
    }

    .page {
      flex: 0 0 100%;
      width: 100%;
      height: 100%;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      position: relative;
      z-index: 10;
      padding: 20px;
    }

    .progress-dots {
      position: fixed;
      top: 30px;
      left: 50%;
      transform: translateX(-50%);
      display: flex;
      gap: 12px;
      z-index: 100;
    }

    .progress-dot {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      background-color: rgba(93, 78, 55, 0.3);
      transition: all 0.3s ease;
    }

    .progress-dot.active {
      background-color: #5D4E37;
      transform: scale(1.2);
    }

    .content {
      display: flex;
      flex-direction: column;
      align-items: center;
      text-align: center;
    }

    .dog-image {
      width: 280px;
      height: 280px;
      margin-bottom: 40px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .dog-image img {
      max-width: 100%;
      max-height: 100%;
    }

    .main-text {
      font-size: 24px;
      font-weight: 500;
      color: #5D4E37;
      line-height: 1.6;
      padding: 0 20px;
    }

    .sub-text {
      font-size: 18px;
      color: #8B7355;
      margin-top: 10px;
      padding: 0 20px;
    }

    .touch-hint {
      position: fixed;
      bottom: 40px;
      left: 0;
      right: 0;
      text-align: center;
      font-size: 14px;
      color: #A0937D;
      animation: pulse 2s ease-in-out infinite;
      z-index: 100;
    }

    @keyframes pulse {
      0%, 100% { opacity: 0.5; }
      50% { opacity: 1; }
    }

    .video-wrapper {
      width: 100%;
      max-width: 400px;
      margin-bottom: 20px;
      background: #FFF8DC;
      border-radius: 12px;
      overflow: hidden;
    }

    .video-wrapper iframe {
      width: 100%;
      height: 225px;
      border: none;
      display: block;
    }

    .video-label {
      font-size: 16px;
      color: #8B7355;
      margin-top: 10px;
    }

    .page-enter {
      animation: fadeInUp 0.3s ease-out;
    }

    @keyframes fadeInUp {
      from {
        opacity: 0;
        transform: translateY(20px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    /* 音乐控制按钮 */
    .music-control {
      position: fixed;
      top: 30px;
      right: 20px;
      width: 44px;
      height: 44px;
      border-radius: 50%;
      background: rgba(93, 78, 55, 0.8);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 200;
      cursor: pointer;
      transition: transform 0.2s;
    }

    .music-control:active {
      transform: scale(0.9);
    }

    .music-icon {
      font-size: 20px;
      color: #fff;
    }

    .music-control.playing .music-icon {
      animation: rotate 3s linear infinite;
    }

    @keyframes rotate {
      from { transform: rotate(0deg); }
      to { transform: rotate(360deg); }
    }
  </style>
</head>
<body>
  <!-- 背景音乐 -->
  <audio id="bgMusic" loop>
    <source src="video/背景音乐.m4a" type="audio/mp4">
  </audio>

  <!-- 音乐控制按钮 -->
  <div class="music-control" id="musicControl" onclick="toggleMusic()">
    <span class="music-icon" id="musicIcon">♪</span>
  </div>

  <div class="stars" id="stars"></div>

  <div class="app">
    <div class="progress-dots" id="progressDots"></div>

    <div class="pages" id="pages">
      <!-- 第1页 - 封面 -->
      <div class="page" data-page="0">
        <div class="content">
          <div class="dog-image">
            <img src="image/来了.gif" alt="小狗">
          </div>
          <p class="main-text">瑶瑶，欢迎回家呀</p>
        </div>
      </div>

      <!-- 第2页 - 问候第一句 -->
      <div class="page" data-page="1">
        <div class="content">
          <div class="dog-image">
            <img src="image/汪汪.gif" alt="小狗">
          </div>
          <p class="main-text">今天也认认真真忙了一整天对不对</p>
        </div>
      </div>

      <!-- 第3页 - 问候第二句 -->
      <div class="page" data-page="2">
        <div class="content">
          <div class="dog-image">
            <img src="image/凌乱.gif" alt="小狗">
          </div>
          <p class="main-text">是不是累得都蔫蔫啦</p>
        </div>
      </div>

      <!-- 第4页 - 放松开场 -->
      <div class="page" data-page="3">
        <div class="content">
          <div class="dog-image">
            <img src="image/转圈圈.gif" alt="小狗">
          </div>
          <p class="main-text">来跟着小狗慢慢舒展一下身体吧</p>
        </div>
      </div>

      <!-- 第5页 - 肩颈预告 -->
      <div class="page" data-page="4">
        <div class="content">
          <div class="dog-image">
            <img src="image/期待.gif" alt="小狗">
          </div>
          <p class="main-text">先松一松僵掉的肩颈，好不好</p>
        </div>
      </div>

      <!-- 第6页 - 亲自尝试 -->
      <div class="page" data-page="5">
        <div class="content">
          <div class="dog-image">
            <img src="image/锻炼.gif" alt="小狗">
          </div>
          <p class="main-text">小狗亲自试过，</p>
          <p class="sub-text">真的很有效的哦</p>
        </div>
      </div>

      <!-- 第7页 - 肩颈视频 -->
      <div class="page" data-page="6">
        <div class="content">
          <div class="video-wrapper" id="shoulderWrapper">
            <iframe
              id="shoulderVideo"
              src=""
              scrolling="no"
              allowfullscreen="true"
              frameborder="0"
              allow="autoplay; fullscreen"
            ></iframe>
          </div>
          <p class="video-label">肩颈舒缓</p>
        </div>
      </div>

      <!-- 第8页 - 肩颈完成 -->
      <div class="page" data-page="7">
        <div class="content">
          <div class="dog-image">
            <img src="image/嘿嘿.gif" alt="小狗">
          </div>
          <p class="main-text">瑶瑶超棒的～肩膀是不是松快一点啦</p>
        </div>
      </div>

      <!-- 第9页 - 腰部预告 -->
      <div class="page" data-page="8">
        <div class="content">
          <div class="dog-image">
            <img src="image/啦啦啦.gif" alt="小狗">
          </div>
          <p class="main-text">接着来拉一拉坐酸了的腰吧</p>
        </div>
      </div>

      <!-- 第10页 - 腰部视频 -->
      <div class="page" data-page="9">
        <div class="content">
          <div class="video-wrapper" id="waistWrapper">
            <iframe
              id="waistVideo"
              src=""
              scrolling="no"
              allowfullscreen="true"
              frameborder="0"
              allow="autoplay; fullscreen"
            ></iframe>
          </div>
          <p class="video-label">腰部舒缓</p>
        </div>
      </div>

      <!-- 第11页 - 腰部完成 -->
      <div class="page" data-page="10">
        <div class="content">
          <div class="dog-image">
            <img src="image/送你花花.gif" alt="小狗">
          </div>
          <p class="main-text">太厉害啦～腰是不是舒服多啦</p>
        </div>
      </div>
    </div>

    <p class="touch-hint" id="touchHint">点击任意处继续</p>
  </div>

  <script>
    const TOTAL_PAGES = 11;
    let currentPage = 0;
    let touchStartX = 0;
    let musicPlaying = false;
    let videoPlaying = false;

    // 背景音乐
    const bgMusic = document.getElementById('bgMusic');
    const musicControl = document.getElementById('musicControl');
    const musicIcon = document.getElementById('musicIcon');

    // 视频URL（带自动播放）
    const SHOULDER_VIDEO_URL = 'https://player.bilibili.com/player.html?bvid=BV1vu411e7fC&page=1&autoplay=1';
    const WAIST_VIDEO_URL = 'https://player.bilibili.com/player.html?bvid=BV1pV4y1C7eu&page=1&autoplay=1';

    // 获取视频元素
    const shoulderVideo = document.getElementById('shoulderVideo');
    const waistVideo = document.getElementById('waistVideo');

    // 切换音乐播放
    function toggleMusic() {
      if (musicPlaying) {
        bgMusic.pause();
        musicIcon.textContent = '♪';
        musicControl.classList.remove('playing');
      } else {
        bgMusic.play().catch(e => console.log('播放失败:', e));
        musicIcon.textContent = '♫';
        musicControl.classList.add('playing');
      }
      musicPlaying = !musicPlaying;
    }

    // 生成星星
    function createStars() {
      const starsContainer = document.getElementById('stars');
      const starCount = Math.floor(Math.random() * 6) + 15;

      for (let i = 0; i < starCount; i++) {
        const star = document.createElement('div');
        star.className = 'star';
        star.style.left = Math.random() * 100 + '%';
        star.style.top = Math.random() * 100 + '%';
        star.style.width = (Math.floor(Math.random() * 9) + 6) + 'px';
        star.style.height = star.style.width;
        star.style.animationDelay = Math.random() * 5 + 's';
        star.style.animationDuration = (Math.random() * 3 + 3) + 's';
        starsContainer.appendChild(star);
      }
    }

    // 生成进度点
    function createProgressDots() {
      const container = document.getElementById('progressDots');
      container.innerHTML = '';
      for (let i = 0; i < TOTAL_PAGES; i++) {
        const dot = document.createElement('div');
        dot.className = 'progress-dot' + (i === currentPage ? ' active' : '');
        dot.dataset.index = i;
        container.appendChild(dot);
      }
    }

    // 检查是否有视频正在播放（通过检测iframe是否有内容）
    function checkVideoPlaying() {
      const shoulderHasSrc = shoulderVideo.src && shoulderVideo.src !== '';
      const waistHasSrc = waistVideo.src && waistVideo.src !== '';
      return (shoulderHasSrc && currentPage === 6) || (waistHasSrc && currentPage === 9);
    }

    // 跳转到指定页面
    function goToPage(index) {
      if (index < 0 || index >= TOTAL_PAGES) return;

      // 离开页面时
      if (currentPage === 6) {
        shoulderVideo.src = '';
      }
      if (currentPage === 9) {
        waistVideo.src = '';
      }

      // 如果离开视频页，暂停背景音乐一会儿再恢复
      if ((currentPage === 6 || currentPage === 9) && !videoPlaying) {
        bgMusic.pause();
      }

      currentPage = index;
      const pages = document.getElementById('pages');
      pages.style.transform = `translateX(-${currentPage * 100}%)`;

      document.querySelectorAll('.progress-dot').forEach((dot, i) => {
        dot.className = 'progress-dot' + (i === currentPage ? ' active' : '');
      });

      const hint = document.getElementById('touchHint');
      if (currentPage === TOTAL_PAGES - 1) {
        hint.textContent = '右滑返回 · 点击重新开始';
      } else {
        hint.textContent = '点击任意处继续';
      }

      document.querySelectorAll('.page')[currentPage].classList.add('page-enter');

      // 进入视频页时
      if (currentPage === 6) {
        shoulderVideo.src = SHOULDER_VIDEO_URL;
        videoPlaying = true;
        bgMusic.pause(); // 视频播放时暂停背景音乐
      } else if (currentPage === 9) {
        waistVideo.src = WAIST_VIDEO_URL;
        videoPlaying = true;
        bgMusic.pause(); // 视频播放时暂停背景音乐
      } else {
        videoPlaying = false;
        // 非视频页面恢复背景音乐
        if (musicPlaying) {
          bgMusic.play().catch(e => console.log('播放失败:', e));
        }
      }
    }

    function nextPage() {
      if (currentPage < TOTAL_PAGES - 1) {
        goToPage(currentPage + 1);
      } else {
        goToPage(0);
      }
    }

    function prevPage() {
      if (currentPage > 0) {
        goToPage(currentPage - 1);
      }
    }

    document.addEventListener('touchstart', (e) => {
      touchStartX = e.touches[0].clientX;
    }, { passive: true });

    document.addEventListener('touchend', (e) => {
      const deltaX = e.changedTouches[0].clientX - touchStartX;
      if (Math.abs(deltaX) > 50) {
        if (deltaX < 0) {
          nextPage();
        } else {
          prevPage();
        }
      }
    }, { passive: true });

    document.querySelector('.app').addEventListener('click', (e) => {
      // 如果点击的是iframe视频区域或音乐按钮，不处理
      if (e.target.tagName === 'IFRAME' || e.target.closest('.music-control')) {
        return;
      }
      nextPage();
    });

    // 页面加载完成后尝试播放音乐
    document.addEventListener('DOMContentLoaded', () => {
      // 用户首次交互后自动播放音乐
      document.addEventListener('touchstart', function initMusic() {
        if (!musicPlaying) {
          bgMusic.play().then(() => {
            musicPlaying = true;
            musicIcon.textContent = '♫';
            musicControl.classList.add('playing');
          }).catch(e => console.log('自动播放被阻止:', e));
        }
        document.removeEventListener('touchstart', initMusic);
      }, { once: true });
    });

    // 初始化
    createStars();
    createProgressDots();
    goToPage(0);
  </script>
</body>
</html>
